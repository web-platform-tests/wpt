<!DOCTYPE html>
<title>Historical Permissions Policy features should not be present</title>
<link rel="help" href="https://www.w3.org/TR/permissions-policy/" />
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<body>
  <script>
    // Test 1: document.permissionsPolicy API should not exist (replaced by document.featurePolicy)
    test(() => {
      assert_false(
        "permissionsPolicy" in document,
        "document.permissionsPolicy should not exist"
      );
    }, "document.permissionsPolicy should not be present (use document.featurePolicy instead)");

    // Test 2: HTMLIFrameElement.permissionsPolicy API should not exist (replaced by featurePolicy)
    test(() => {
      assert_false(
        "permissionsPolicy" in HTMLIFrameElement.prototype,
        "HTMLIFrameElement.prototype.permissionsPolicy should not exist"
      );
    }, "HTMLIFrameElement.prototype.permissionsPolicy should not be present");

    // Test 3: Permissions-Policy header takes precedence over Feature-Policy header
    // The header file sets:
    //   Permissions-Policy: sync-xhr=*  (allows sync-xhr)
    //   Feature-Policy: sync-xhr 'none' (would block sync-xhr)
    // If Permissions-Policy correctly takes precedence, sync XHR should work
    test(() => {
      const xhr = new XMLHttpRequest();
      xhr.open("GET", document.location.href, false);
      xhr.send();
      assert_equals(
        xhr.status,
        200,
        "Sync XHR should succeed because Permissions-Policy allows it"
      );
    }, "Permissions-Policy header takes precedence over Feature-Policy header");

    // Test 4: iframe allow attribute should work with Permissions Policy
    promise_test(async () => {
      const iframe = document.createElement("iframe");
      iframe.src = "resources/historical-iframe.html";
      iframe.allow = "sync-xhr 'none'";

      const result = await new Promise((resolve) => {
        window.addEventListener("message", (e) => {
          if (e.source === iframe.contentWindow) {
            resolve(e.data);
          }
        });
        document.body.appendChild(iframe);
      });

      assert_equals(
        result.result,
        "blocked",
        "sync-xhr should be blocked in iframe when allow=\"sync-xhr 'none'\""
      );
    }, "iframe allow attribute blocks features using Permissions Policy syntax");
  </script>
</body>
