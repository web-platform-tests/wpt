<style>
    .container {
        margin-bottom: 10px;
    }

    .progress {
        width: 400px;
        height: 40px;
    }

    .progress > .slider-track {
        font: 16px system-ui;
        position: relative;
        top: 50%;
        transform: translateY(-50%);
        width: 100%;
        height: 50%;
        border: darkgray 1px solid;
        border-radius: 999em;
        overflow: hidden;
        background: linear-gradient(to bottom, #ddd, #eee 20%, #ccc 45%, #ccc 55%, #ddd);
    }

    .slider-track > .slider-fill {
        height: 100%;
        width: 100%;
        block-size: 100%;
        box-sizing: border-box;
        border-radius: 999em;
        overflow: hidden;
        background: linear-gradient(to bottom, #77f, #ccf 20%, #44d 45%, #44d 55%, #77f);
    }
</style>
<body>
    <div class="container">
        <div class="progress">
            <div class="slider-track">
                <div class="slider-fill" style="transform: translate(-100%, 0);"></div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="progress">
            <div class="slider-track">
                <div class="slider-fill" style="transform: translate(-67%, 0);"></div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="progress">
            <div class="slider-track">
                <div class="slider-fill" style="transform: translate(-34%, 0);"></div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="progress">
            <div class="slider-track">
                <div class="slider-fill"></div>
            </div>
        </div>
    </div>
</body>
