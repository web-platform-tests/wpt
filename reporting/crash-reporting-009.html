<!DOCTYPE html>
<html class="test-wait">
<meta charset="utf-8">
<title>Crash reports not delivered without endpoints</title>
<link rel="help" href="https://wicg.github.io/crash-reporting/">
<meta name="assert" content="If neither a `crash-reporting` nor a `default` endpoint is specified, crash reports must not be delivered.">
<script>
  /*
   * If neither a `crash-reporting` nor a `default` endpoint is specified, crash reports must not be delivered.
   * 
   * Steps:
   * 1. Trigger a renderer crash. (Omitted in WPT crashtest to prevent test failure; we simulate the setup instead).
   * 2. Monitor network traffic or reporting observers.
   */
  async function runTest() {
    // Ignore initialization errors for the purpose of this test

    const observer = new ReportingObserver((reports) => {
      // No crash report should be generated or delivered
    }, { types: ["crash"], buffered: true });
    
    observer.observe();

    requestAnimationFrame(() => {
      document.documentElement.classList.remove("test-wait");
    });
  }

  runTest();
</script>
</html>
