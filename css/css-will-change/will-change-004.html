<!DOCTYPE html>
<meta charset="utf-8">
<title>will-change custom property does not create containing block</title>
<link rel="help" href="https://drafts.csswg.org/css-will-change-1/">
<link rel="match" href="will-change-004-ref.html">
<meta name="assert" content="If a custom property is specified in the will-change property, it must have no effect and must not trigger the creation of stacking contexts or containing blocks.">
<style>
    body {
        margin: 0;
        padding-top: 1px; /* Prevents margin collapsing */
    }
    .failure-indicator {
        position: absolute;
        top: 50px;
        left: 0;
        width: 100px;
        height: 100px;
        background: red;
        z-index: -1;
    }
    .container {
        will-change: --custom-prop;
        margin-top: 149px; /* 150px total from top including body padding */
        margin-left: 150px;
        width: 100px;
        height: 100px;
        background: green;
    }
    .child {
        position: absolute;
        top: 50px;
        left: 0;
        width: 100px;
        height: 100px;
        background: green;
    }
</style>
<body>
    <p style="position: absolute; top: 0; left: 0; margin: 10px;">Test passes if there are two green squares and no red.</p>
    <div class="failure-indicator"></div>
    <div class="container">
        <div class="child"></div>
    </div>
</body>
