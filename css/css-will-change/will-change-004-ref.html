<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Reference</title>
<style>
    body {
        margin: 0;
    }
    .box1 {
        position: absolute;
        top: 50px;
        left: 0;
        width: 100px;
        height: 100px;
        background: green;
    }
    .box2 {
        position: absolute;
        top: 150px;
        left: 150px;
        width: 100px;
        height: 100px;
        background: green;
    }
</style>
<body>
    <p style="position: absolute; top: 0; left: 0; margin: 10px;">Test passes if there are two green squares and no red.</p>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
