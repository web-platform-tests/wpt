<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS will-change: 'will-change: --my-custom-property' does not create a stacking context</title>
<link rel="help" href="https://drafts.csswg.org/css-will-change-1/#will-change">
<link rel="match" href="green-square-100-by-100-ref.html">
<meta name="assert" content="If a custom CSS property is specified as a <custom-ident> value in the will-change property, it must have no effect.">
<style>
html, body { margin: 0; padding: 0 }
div { width: 100px; height: 100px }
#wc { will-change: --my-custom-property; background: green }
#child { position: absolute; top: 0; left: 0; z-index: -1; background: red }
#static-child { width: 0; height: 0 }
</style>
<body>
  <div id="wc">
    <div id="child"></div>
    <div id="static-child"></div>
  </div>
</body>
