<!DOCTYPE html>
<html class="test-wait">
<meta charset="utf-8">
<title>Integration: Crash reports delivered to crash-reporting endpoint</title>
<meta name="assert" content="If a crash-reporting endpoint is specified, crash reports must be delivered to that endpoint.">
<link rel="help" href="https://wicg.github.io/crash-reporting/">
<script src="/common/utils.js"></script>
<script src="/common/get-host-info.sub.js"></script>
<body>
<script>
/*
 * If a `crash-reporting` endpoint is specified, crash reports must be delivered to that endpoint.
 */
const params = new URLSearchParams(window.location.search);

if (params.has('crash')) {
  // Popup context: Initialize crash report data and trigger an Out-Of-Memory crash.
  (async function() {
    // Ignore initialization errors and proceed to crash to ensure the report is still sent.
    
    // Trigger OOM to crash the renderer
    const arr = [];
    while (true) {
      arr.push(new Array(10 ** 7).fill('crash'));
    }
  })();
} else {
  // Main test context
  (async function() {
    const uid = token();
    const endpointUrl = `/reporting/resources/report.py?reportID=${uid}`;
    const absoluteEndpoint = new URL(endpointUrl, location.href).href;

    const host_info = get_host_info();
    
    // Use a cross-origin URL to ensure the popup runs in a separate process (Site Isolation),
    // preventing the main test page from crashing alongside it.
    const headerValue = `crash-reporting="${absoluteEndpoint}"`;
    const crashUrl = `${host_info.HTTPS_REMOTE_ORIGIN}${location.pathname}?crash=1&pipe=header(Reporting-Endpoints,${headerValue})`;

    const win = window.open(crashUrl, '_blank', 'noopener');

    let reportFound = false;
    const maxAttempts = 30;

    // Poll the reporting endpoint to verify the crash report was delivered
    for (let i = 0; i < maxAttempts; i++) {
      await new Promise(resolve => setTimeout(resolve, 1000));
      try {
        const res = await fetch(endpointUrl);
        if (res.ok) {
          const text = await res.text();
          if (text) {
            const reports = JSON.parse(text);
            const crashReport = reports.find(r => r.type === 'crash');
            
            if (crashReport) {
              reportFound = true;
              break;
            }
          }
        }
      } catch (e) {
        // Ignore fetch errors during polling
      }
    }

    if (win) win.close();

    if (reportFound) {
      document.documentElement.classList.remove('test-wait');
    }
  })();
}
</script>
</body>
</html>
