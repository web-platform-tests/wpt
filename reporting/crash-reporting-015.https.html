<!DOCTYPE html>
<html class="test-wait">
<meta charset="utf-8">
<title>Crash report includes is_top_level boolean</title>
<meta name="timeout" content="long">
<link rel="help" href="https://wicg.github.io/crash-reporting/">
<meta name="assert" content="The crash report body contains an 'is_top_level' field set to true.">
<script src="/common/utils.js"></script>
<script>
/*
 * The crash report body must include an `is_top_level` boolean indicating whether the crashed Document belonged to a top-level traversable.
 */

(async () => {
  const uid = token();
  const endpoint = new URL(`/reporting/resources/report.py?reportID=${uid}`, location.href).href;
  
  // Pre-conditions: Reporting-Endpoints configured.
  const url = `/common/blank.html?pipe=header(Reporting-Endpoints,default="${endpoint}")`;
  const popup = window.open(url);
  
  await new Promise(resolve => {
    popup.onload = resolve;
  });

  // 1. Trigger a renderer crash in a top-level document.
  // We simulate an Out-Of-Memory (OOM) or unresponsive crash by exhausting memory.
  popup.setTimeout(() => {
    try {
      let a = [];
      while (true) {
        a.push(new Array(1000000).join('a'));
      }
    } catch (e) {
      // Catch block in case the browser throws an error instead of crashing immediately.
    }
  }, 100);

  // 2. Inspect the delivered crash report.
  let reports = [];
  let crashReport = null;
  
  // Poll the reporting endpoint until the crash report is delivered.
  for (let i = 0; i < 30; i++) {
    await new Promise(r => setTimeout(r, 1000));
    const res = await fetch(endpoint);
    if (res.ok) {
      try {
        reports = await res.json();
        crashReport = reports.find(r => r.type === "crash");
        if (crashReport) break;
      } catch (e) {
        // Ignore JSON parse errors if the response is empty or malformed during polling.
      }
    }
  }

  if (popup && !popup.closed) {
    popup.close();
  }

  // Expected result: The crash report body contains an 'is_top_level' field set to true.
  if (crashReport && crashReport.body && crashReport.body.is_top_level === true) {
    document.documentElement.classList.remove("test-wait");
  }
})();
</script>
</html>
