<!DOCTYPE html>
<html class="test-wait">
<meta charset="utf-8">
<title>Integration: Crash reports delivered to default endpoint</title>
<meta name="assert" content="A crash report is successfully delivered to the `default` endpoint.">
<link rel="help" href="https://wicg.github.io/crash-reporting/">
<script src="/common/utils.js"></script>
<body>
<script>
/*
 * If a `crash-reporting` endpoint is not specified but a `default` endpoint is specified, crash reports must be delivered to the `default` endpoint.
 */
(async () => {
  // Pre-condition: Reporting-Endpoints header configured with a `default` endpoint only.
  const uid = token();
  const endpointUrl = `${location.origin}/reporting/resources/report.py?reportID=${uid}`;
  
  const iframe = document.createElement('iframe');
  const header = `default="${endpointUrl}"`;
  iframe.src = `/common/blank.html?pipe=header(Reporting-Endpoints,${encodeURIComponent(header)})`;
  
  const iframeLoaded = new Promise(resolve => {
    iframe.onload = resolve;
  });
  document.body.appendChild(iframe);
  await iframeLoaded;

  // Step 1: Trigger a renderer crash.
  // We attempt to cause an Out-Of-Memory (OOM) crash in the iframe.
  const doc = iframe.contentDocument;
  const script = doc.createElement('script');
  script.textContent = `
    setTimeout(() => {
      try {
        const arrays = [];
        while (true) {
          arrays.push(new Array(10 ** 7).fill(Math.random()));
        }
      } catch (e) {
        // If the browser throws an exception instead of crashing, 
        // the crash report might not be generated, but this is the 
        // standard best-effort approach to trigger a renderer crash in WPT.
      }
    }, 100);
  `;
  doc.body.appendChild(script);

  // Step 2: Monitor the configured default endpoint for incoming reports.
  let reportFound = false;
  const maxAttempts = 30;
  for (let i = 0; i < maxAttempts; i++) {
    await new Promise(r => setTimeout(r, 1000));
    try {
      const res = await fetch(`${endpointUrl}&op=retrieve`);
      if (res.ok) {
        const reports = await res.json();
        if (reports.some(r => r.type === 'crash')) {
          reportFound = true;
          break;
        }
      }
    } catch (e) {
      // Ignore fetch errors during polling
    }
  }

  // Expected Result: A crash report is successfully delivered to the `default` endpoint.
  if (reportFound) {
    document.documentElement.classList.remove("test-wait");
  }
})();
</script>
</body>
</html>
