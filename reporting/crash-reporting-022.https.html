<!DOCTYPE html>
<html class="test-wait">
<meta charset="utf-8">
<title>delete() dynamically writes to crash report buffers</title>
<link rel="help" href="https://wicg.github.io/crash-reporting/">
<meta name="assert" content="When `delete(key)` is executed, the key must be removed from the internal map state and the updated JSON-serialized map must be dynamically written to the user agent's crash report buffers.">
<script>
  /*
   * Description: When `delete(key)` is executed, the key must be removed from the 
   * internal map state and the updated JSON-serialized map must be dynamically 
   * written to the user agent's crash report buffers.
   */
  async function runTest() {
    if (window.crashReport) {
      try {
        // Step 1: Call initialize(1024).
        await window.crashReport.initialize(1024);
        
        // Step 2: Call set('keyToDelete', 'value').
        window.crashReport.set('keyToDelete', 'value');
        
        // Step 3: Call delete('keyToDelete').
        window.crashReport.delete('keyToDelete');
        
        // Step 4 & 5: Triggering a renderer crash and inspecting the report
        // are conceptual steps for the feature. In a WPT crashtest context,
        // we assert that the browser does not crash during the execution of
        // these API methods themselves.
      } catch (e) {
        // Catching errors to ensure the test only fails if the browser process crashes.
      }
    }
    document.documentElement.classList.remove('test-wait');
  }

  runTest();
</script>
</html>
