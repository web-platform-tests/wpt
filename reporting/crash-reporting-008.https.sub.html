<!DOCTYPE html>
<html class="test-wait">
<meta charset="utf-8">
<title>Crash reports delivered to default endpoint</title>
<link rel="help" href="https://wicg.github.io/crash-reporting/">
<meta name="assert" content="A crash report is successfully delivered to the `default` endpoint.">
<script src="/resources/testdriver.js"></script>
<script src="/resources/testdriver-vendor.js"></script>
<script src="/common/utils.js"></script>
<script>
/*
 * If a `crash-reporting` endpoint is not specified but a `default` endpoint is specified, crash reports must be delivered to the `default` endpoint.
 */

async function runTest() {
  const reportID = token();
  const mainOrigin = `https://{{host}}:{{ports[https][0]}}`;
  const endpointUrl = `${mainOrigin}/reporting/resources/report.py?reportID=${reportID}`;
  
  const altOrigin = `https://{{hosts[alt]}}:{{ports[https][0]}}`;
  
  // 1. Trigger a renderer crash.
  // We use a cross-origin popup to ensure the crash happens in a separate process 
  // (where supported by site isolation) so it doesn't take down the main test window.
  const crashScript = `
    <script>
      setTimeout(() => {
        const arr = [];
        while (true) {
          // Rapidly allocate memory to trigger an Out-Of-Memory (OOM) crash
          arr.push(new ArrayBuffer(100 * 1024 * 1024));
        }
      }, 1000);
    </scr` + `ipt>
  `;
  
  const encodedScript = encodeURIComponent(crashScript);
  
  // Inject the Reporting-Endpoints header via WPT pipes to satisfy the pre-condition.
  const popupUrl = `${altOrigin}/common/blank.html?pipe=header(Reporting-Endpoints,default="${endpointUrl}")|header(Origin-Agent-Cluster,?1)|slice(null,0)|append(${encodedScript})`;
  
  await test_driver.bless("Open crash popup", () => {
    window.open(popupUrl, '_blank', 'noopener');
  });
  
  // 2. Monitor the configured default endpoint for incoming reports.
  const checkReport = async () => {
    try {
      const res = await fetch(endpointUrl);
      if (!res.ok) return false;
      const reports = await res.json();
      return reports.some(r => r.type === 'crash');
    } catch (e) {
      return false;
    }
  };
  
  let reportFound = false;
  // Poll for up to 15 seconds to allow time for the crash and report delivery
  for (let i = 0; i < 30; i++) {
    await new Promise(resolve => setTimeout(resolve, 500));
    if (await checkReport()) {
      reportFound = true;
      break;
    }
  }
  
  if (reportFound) {
    document.documentElement.classList.remove("test-wait");
  }
}

runTest();
</script>
</html>
